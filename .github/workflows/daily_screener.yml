name: Daily Stock Screener

on:
  schedule:
    - cron: '0 15 * * 1-5'   # 台灣時間 23:00（UTC+8），週一至週五
  workflow_dispatch:           # 手動觸發

permissions:
  contents: write

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Setup Python
        uses: actions/setup-python@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install system fonts and Playwright Chromium
        run: |
          for i in 1 2 3; do
            sudo apt-get install -y -q fonts-noto-cjk && break
            echo "第 $i 次安裝失敗，10 秒後重試..."
            sleep 10
          done
          python -m playwright install chromium --with-deps

      - name: Run screener
        env:
          FINMIND_TOKEN:  ${{ secrets.FINMIND_TOKEN }}
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
          PUSHOVER_USER:  ${{ secrets.PUSHOVER_USER }}
        run: python screener.py

      - name: Keep repo active
        run: |
          date "+%Y-%m-%d %H:%M:%S %Z" > last_run.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_run.txt
          git diff --cached --quiet || git commit -m "chore: update last run timestamp"
          git push
